<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="__SEO_DESCRIPTION__" />
    <meta name="keywords" content="__SEO_KEYWORDS__" />
    <meta name="author" content="Petya Yaneva" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="geo.region" content="BG-22" />
    <meta name="geo.placename" content="София" />
    <link rel="alternate" hreflang="bg" href="/" />
    <title>__SEO_TITLE__</title>
    <!--
      Open Graph: абсолютни URL се инжектират при build (VITE_PUBLIC_SITE_URL или VERCEL_URL).
      Facebook/Messenger изискват пълни https адреси за og:image и og:url — виж vite.config.ts.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="bg_BG" />
    <meta property="og:title" content="__SEO_TITLE__" />
    <meta property="og:description" content="__SEO_DESCRIPTION__" />
    <meta property="og:site_name" content="__SEO_OG_SITE_NAME__" />
    __OG_CANONICAL_BLOCK__
    <link rel="image_src" href="__OG_IMAGE__" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:url" content="__OG_IMAGE__" />
    <meta property="og:image:secure_url" content="__OG_IMAGE__" />
    <meta property="og:image:type" content="__SEO_SHARE_IMAGE_TYPE__" />
    <meta property="og:image:width" content="__SEO_SHARE_IMAGE_WIDTH__" />
    <meta property="og:image:height" content="__SEO_SHARE_IMAGE_HEIGHT__" />
    <meta property="og:image:alt" content="__SEO_OG_IMAGE_ALT__" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__SEO_TITLE__" />
    <meta name="twitter:description" content="__SEO_DESCRIPTION__" />
    <meta name="twitter:image" content="__OG_IMAGE__" />
    <meta name="twitter:image:alt" content="__SEO_OG_IMAGE_ALT__" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
